<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tery Market</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #ff4d4d;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.search-box {
  padding: 10px;
  text-align: center;
}

.search-box input {
  width: 90%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.category {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.category div {
  background: white;
  padding: 10px;
  border-radius: 10px;
  white-space: nowrap;
}

.product {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 8px;
  background: #ff4d4d;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>

</head>

<body>

<header>
🛒 Tery Market - ร้านค้าทั่วไป
</header>

<div class="search-box">
<input type="text" placeholder="ค้นหาสินค้า...">
</div>

<div class="category">
<div>👕 เสื้อผ้า</div>
<div>👟 รองเท้า</div>
<div>💄 เครื่องสำอาง</div>
<div>📱 มือถือ</div>
<div>🏠 ของใช้</div>
</div>

<div class="product">

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>เสื้อยืด</h4>
<p>199 บาท</p>
<button>เพิ่มลงตะกร้า</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>รองเท้า</h4>
<p>499 บาท</p>
<button>เพิ่มลงตะกร้า</button>
</div>

</div>

</body>
</html>
