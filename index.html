<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tery Market</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;

  white-space: nowrap;

.card {

  padding: 10px;
  border-radius: 10px;
}

.card img {

}

button {
  width: 100%;
  padding: 8px;
  background: #ff4d4d;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>

</head>

</div>

<div class="product">

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>เสื้อยืด</h4>
<p>199 บาท</p>
<button>เพิ่มลงตะกร้า</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>รองเท้า</h4>
<p>499 บาท</p>
<button>เพิ่มลงตะกร้า</button>
</div>

</div>

</body>
</html>
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #ff4d4d;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
}

.product {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}

.category {
  margin-top: 10px;
  padding: 5px;
  background: #fff;
}
</style>
</head>

<body>

<header>🛒 My Shop (เพิ่มสินค้าได้เอง)</header>

<div class="container">

<h3>➕ เพิ่มหมวดหมู่</h3>
<input id="newCat" placeholder="ชื่อหมวดหมู่">
<button onclick="addCategory()">เพิ่มหมวดหมู่</button>

<select id="categoryList"></select>

<hr>

<h3>➕ เพิ่มสินค้า</h3>

<input id="name" placeholder="ชื่อสินค้า">
<textarea id="desc" placeholder="รายละเอียดสินค้า"></textarea>
<input id="price" placeholder="ราคา">
<input id="img" placeholder="ลิงก์รูปภาพ (URL)">
<button onclick="addProduct()">เพิ่มสินค้า</button>

<hr>

<h3>📦 สินค้า</h3>
<div id="productList"></div>

</div>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || ["ทั่วไป"];
let products = JSON.parse(localStorage.getItem("products")) || [];

function save() {
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("products", JSON.stringify(products));
  render();
}

function addCategory() {
  let cat = document.getElementById("newCat").value;
  if(cat) {
    categories.push(cat);
    save();
  }
}

function addProduct() {
  let p = {
    name: document.getElementById("name").value,
    desc: document.getElementById("desc").value,
    price: document.getElementById("price").value,
    img: document.getElementById("img").value,
    cat: document.getElementById("categoryList").value
  };

  products.push(p);
  save();
}

function render() {
  let catSelect = document.getElementById("categoryList");
  catSelect.innerHTML = "";

  categories.forEach(c => {
    let opt = document.createElement("option");
    opt.text = c;
    catSelect.add(opt);
  });

  let list = document.getElementById("productList");
  list.innerHTML = "";

  products.forEach(p => {
    list.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <b>${p.price} บาท</b>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
